name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Compile, Test, and Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Check
        run: python -m compileall app.py src scripts tests

      - name: Pytest
        run: pytest -q

      - name: Headless Streamlit Smoke
        shell: bash
        run: |
          set +e
          timeout 45s bash -lc 'python -m streamlit run app.py --server.headless true --server.port 8511 > .tmp_streamlit_ci.log 2>&1'
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat .tmp_streamlit_ci.log
            exit "$status"
          fi
          if ! grep -Eq "Local URL|Network URL|You can now view" .tmp_streamlit_ci.log; then
            cat .tmp_streamlit_ci.log
            exit 1
          fi
